apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-app
  namespace: gitops
spec:
  project: default
  source:
    repoURL: https://github.com/ayleeee/devops-gitops-manifests.git
    targetRevision: main
    path: apps/devops-app
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: devops-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
